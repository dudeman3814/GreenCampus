<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCampus</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../assets/images/logo.png">
</head>

<body>
    <header>
        <h1>Events</h1>
        <h3>
            <nav>
                <ul>
                    <li><button><a href="../index.html">Home</button></a></li>
                    <li><button><a href="events.html">Events</button></a></li>
                    <li><button><a href="tips.html"> Tips</button></a></li>
                </ul>
            </nav>
        </h3>
    </header>

    <main>
        <section id="event-schedule">
            <div id="events-container"></div>
        </section>
    </main>
    <script>
        fetch('../assets/events.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('events-container');

                data.events.forEach((event, index) => {
                    const card = document.createElement('div');
                    card.classList.add('event-card');
                    card.id = `card${index}`;

                    card.innerHTML = `
                        <h3>${event.name}</h3>
                        <p>${event.date}</p>
                        <p>${event.time}</p>
                    `;

                    container.appendChild(card);
                });
            })
            .catch(error => console.error('Failed to fetch data:', error));
    </script>ss
    <footer>
        <p>Copyright Faux: GreenCampus &copy;2026 <br> Contact Us Faux: tel 01632960123</p>
    </footer>
</body>

</html>
